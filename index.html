<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>CORE</title>
<style>
  :root {
    --bg: #0a0e14;
    --grid: #11161f;
    --core: #7df9ff;     /* signature cyan */
    --core-dim: #2a6e74;
    --enemy: #ff5d73;
    --xp: #9d7bff;
    --ink: #e7ecf3;
    --muted: #5d6b7e;
    --card: #131a25;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; }
  body {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    touch-action: none; user-select: none;
  }
  #stage { position: relative; width: 100vw; height: 100vh; max-width: 540px; }
  canvas { display: block; width: 100%; height: 100%; }

  /* HUD */
  #hud { position: absolute; inset: 0; pointer-events: none; }
  .topbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(78px, calc(14px + env(safe-area-inset-top))) 16px 14px;
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 13px; letter-spacing: .08em;
  }
  .stat { color: var(--muted); }
  .stat b { color: var(--ink); font-weight: 600; }
  #slow-badge { color: #9d7bff; font-size: 11px; font-weight: 700; letter-spacing: .18em; opacity: 0; transition: opacity .3s; pointer-events: none; }
  #hud.lowcore .topbar .stat:last-child b { color: var(--enemy); text-shadow: 0 0 12px rgba(255,93,115,.65); animation: lowcorePulse .75s ease-in-out infinite alternate; }
  #hud.lowcore .xpbar { box-shadow: 0 0 12px rgba(255,93,115,.28); }
  .xpbar { position: absolute; top: max(112px, calc(48px + env(safe-area-inset-top))); left: 16px; right: 16px; height: 3px; background: #1a2230; border-radius: 2px; }
  .xpbar > i { display: block; height: 100%; width: 0; background: var(--xp); border-radius: 2px; transition: width .12s linear; }
  #waveflash {
    position: absolute; left: 50%; top: 34%; transform: translate(-50%, -50%) scale(.96);
    color: var(--core); font-size: 18px; font-weight: 700; letter-spacing: .28em;
    text-shadow: 0 0 18px var(--core-dim); opacity: 0; transition: opacity .18s, transform .18s;
  }
  #waveflash.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  /* skill buttons (thumb zone, bottom) */
  #skills {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 18px 16px calc(18px + env(safe-area-inset-bottom));
    display: flex; gap: 12px; justify-content: center; pointer-events: none;
  }
  #skills .skill {
    pointer-events: auto;
    width: 72px; height: 72px; border-radius: 18px;
    background: var(--card); border: 1px solid #1e2836;
    color: var(--ink); font-size: 12px; letter-spacing: .04em;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    position: relative; overflow: hidden; transition: transform .08s;
  }
  #skills .skill:active { transform: scale(.94); }
  #skills .skill .nm { font-weight: 600; }
  #skills .skill .tap { font-size: 9px; color: var(--muted); }
  #skills .skill .cd { position: absolute; inset: 0; background: rgba(10,14,20,.78); transform-origin: bottom; }
  #skills .skill.aiming { border-color: var(--core); box-shadow: 0 0 0 1px var(--core); }

  /* level-up overlay */
  #overlay {
    position: absolute; inset: 0; background: rgba(6,9,13,.82); backdrop-filter: blur(3px);
    display: none; flex-direction: column; align-items: center; justify-content: safe center; gap: 16px;
    pointer-events: auto; overflow-y: auto;
    padding: max(24px, calc(16px + env(safe-area-inset-top))) 24px max(24px, calc(16px + env(safe-area-inset-bottom)));
  }
  #overlay.show { display: flex; }
  #overlay h2 { margin: 0; font-size: 14px; letter-spacing: .3em; color: var(--core); font-weight: 600; }
  #overlay .sub { font-size: 11px; color: var(--muted); letter-spacing: .15em; margin-top: -8px; }
  .cards {
    display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px;
    max-height: calc(100vh - 220px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow-y: auto;
  }
  .pick {
    background: var(--card); border: 1px solid #1e2836; border-radius: 16px; padding: 16px 18px;
    text-align: left; color: var(--ink); cursor: pointer; transition: border-color .12s, transform .08s;
  }
  .pick:active { transform: scale(.98); }
  .pick .h { display: flex; justify-content: space-between; align-items: center; }
  .pick .name { font-weight: 600; font-size: 15px; }
  .pick.skill .name { color: var(--core); }
  .pick.stat .name { color: var(--xp); }
  .pick .badge { font-size: 9px; color: var(--muted); border: 1px solid #2a3445; border-radius: 6px; padding: 2px 6px; letter-spacing: .1em; }
  .pick .d { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* start / gameover */
  #splash {
    position: absolute; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    pointer-events: auto;
  }
  #splash .logo { font-size: 56px; letter-spacing: .42em; font-weight: 700; color: var(--core); text-shadow: 0 0 24px var(--core-dim); margin-right: -.42em; }
  #splash .tag { font-size: 12px; color: var(--muted); letter-spacing: .22em; }
  #splash .go {
    margin-top: 26px; pointer-events: auto; background: transparent; color: var(--ink);
    border: 1px solid var(--core); border-radius: 999px; padding: 14px 40px; font: inherit;
    letter-spacing: .18em; font-size: 13px;
  }
  #splash .go:active { background: var(--core); color: var(--bg); }
  #splash .dead { color: var(--enemy); font-size: 13px; letter-spacing: .2em; min-height: 18px; }
  #splash .best { color: var(--muted); font-size: 11px; letter-spacing: .22em; min-height: 16px; }
  .hidden { display: none !important; }
  @keyframes lowcorePulse { from { opacity: .72; } to { opacity: 1; } }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="topbar">
      <div class="stat">WAVE <b id="wave">1</b></div>
      <div class="stat">LV <b id="lv">1</b></div>
      <div id="slow-badge">SLOW</div>
      <div class="stat">CORE <b id="hp">100</b></div>
    </div>
    <div class="xpbar"><i id="xpfill"></i></div>
    <div id="waveflash"></div>
    <div id="skills"></div>
  </div>

  <div id="overlay">
    <h2>LEVEL UP</h2>
    <div class="sub">choose one</div>
    <div class="cards" id="cards"></div>
  </div>

  <div id="splash">
    <div class="logo">CORE</div>
    <div class="tag">PROTECT THE CENTER · ONE THUMB</div>
    <div class="dead" id="deadmsg"></div>
    <div class="best" id="killcount"></div>
    <div class="best" id="bestscore"></div>
    <button class="go" id="start">START</button>
  </div>
</div>

<script type="module">
import {
  CONFIG, xpForLevel, gainXp, defaultStats, derive,
  rollOffers, applyStatCard, dist, enemyHitsCore, coreDamageTaken, splitterChildren, xpForKill, waveForTime, clamp, SKILLS, isBossWave,
} from './src/engine.js';
import { draw as drawFrame } from './src/renderer.js';

// --- sfx ------------------------------------------------------------------
const sfx = (() => {
  let ac;
  function ctx() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    return ac;
  }
  function tone(freq, type, vol, decay, freqEnd) {
    const c = ctx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, c.currentTime);
    if (freqEnd !== undefined) o.frequency.exponentialRampToValueAtTime(freqEnd, c.currentTime + decay);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + decay);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + decay);
  }
  return {
    unlock() { ctx(); },
    kill()   { tone(520, 'square',   0.10, 0.07); },
    hit()    { tone(90,  'sawtooth', 0.28, 0.22, 55); },
    levelUp(){ tone(523, 'sine', 0.18, 0.14); setTimeout(() => tone(784, 'sine', 0.18, 0.2), 110); },
    skill()  { tone(680, 'sine',   0.11, 0.09); },
    over()   { tone(220, 'sawtooth', 0.22, 0.35, 110); setTimeout(() => tone(110, 'sawtooth', 0.18, 0.55), 220); },
  };
})();

const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const hudEl = document.getElementById('hud');
const waveFlashEl = document.getElementById('waveflash');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// --- game state ----------------------------------------------------------
let G = null;
let bestWave = parseInt(localStorage.getItem('bestWave') || '0', 10);
let waveFlashTimer = 0;
let fastMode = false;
let fastTimer = null;
function cancelFast() { clearTimeout(fastTimer); fastTimer = null; fastMode = false; }
function newGame() {
  resize();
  G = {
    running: true,
    t: 0, lastSpawn: 0,
    core: { x: W / 2, y: H * 0.46, hp: CONFIG.coreHp },
    stats: defaultStats(),
    level: 1, xp: 0, xpNeeded: xpForLevel(1),
    wave: 1,
    enemies: [], shots: [], fx: [], missiles: [],
    lastAuto: 0,
    unlocked: [],            // skill ids
    cooldowns: {},           // id -> ready time
    slowUntil: 0, shieldUntil: 0, shakeUntil: 0,
    aiming: null,            // skill id awaiting 2nd tap
    paused: false,
    pageHidden: document.hidden,
    lastBossWave: 0,         // last wave number a boss was spawned on
    blinkHome: null, blinkReturn: 0,
    kills: 0,
    drone: { angle: 0, lastZap: 0 },
    bossFlashUntil: 0, pendingLevels: 0,
  };
  cancelFast();
  renderSkillBar();
  overlay.classList.remove('show');
  waveFlashEl.classList.remove('show');
  document.getElementById('splash').classList.add('hidden');
}

function announceWave(wave) {
  waveFlashEl.textContent = `WAVE ${wave}`;
  waveFlashEl.classList.add('show');
  clearTimeout(waveFlashTimer);
  waveFlashTimer = setTimeout(() => waveFlashEl.classList.remove('show'), 850);
}

// --- spawning ------------------------------------------------------------
function spawnEnemy() {
  const d = derive(G.stats, G.wave);
  const edge = Math.floor(Math.random() * 4);
  const m = 20;
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -m; }
  else if (edge === 1) { x = W + m; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + m; }
  else { x = -m; y = Math.random() * H; }
  // occasional tanky variant
  const tanky = Math.random() < 0.12 + G.wave * 0.01;
  const splitter = !tanky && Math.random() < 0.1 + G.wave * 0.005;
  const hp = d.enemyHp * (tanky ? 2.4 : splitter ? 1.5 : 1);
  G.enemies.push({
    x, y, r: tanky ? 13 : splitter ? 11 : 8,
    hp, maxHp: hp,
    spd: d.enemySpeed * (tanky ? 0.7 : splitter ? 0.9 : 1),
    tanky, splitter,
  });
}

function spawnBoss() {
  const d = derive(G.stats, G.wave);
  const edge = Math.floor(Math.random() * 4);
  const m = 40;
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -m; }
  else if (edge === 1) { x = W + m; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + m; }
  else { x = -m; y = Math.random() * H; }
  const hp = d.enemyHp * 8;
  G.enemies.push({ x, y, r: 28, hp, maxHp: hp, spd: d.enemySpeed * 0.35, tanky: false, boss: true });
}

function applyXp(amount) {
  const res = gainXp({ level: G.level, xp: G.xp }, amount);
  G.level = res.level; G.xp = res.xp; G.xpNeeded = res.xpNeeded;
  if (res.leveledUp > 0) {
    G.pendingLevels += res.leveledUp - 1;
    openLevelUp();
  }
}

// --- skills --------------------------------------------------------------
function skillReady(id) {
  return (G.cooldowns[id] || 0) <= G.t;
}
function triggerSkill(id, aimX, aimY) {
  const sk = SKILLS[id];
  if (!skillReady(id)) return;
  G.cooldowns[id] = G.t + sk.cooldown * G.stats.cooldown;
  sfx.skill();
  const c = G.core;
  if (id === 'pulse') {
    for (const e of G.enemies) {
      if (dist(e.x, e.y, c.x, c.y) < 150) e.hp -= 6 * G.stats.power;
    }
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: 150, born: G.t, life: .45, color: '#7df9ff' });
  } else if (id === 'slow') {
    G.slowUntil = G.t + 3;
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: Math.max(W, H), born: G.t, life: .6, color: '#9d7bff' });
  } else if (id === 'shield') {
    G.shieldUntil = G.t + 2.5;
  } else if (id === 'lance') {
    const ang = Math.atan2(aimY - c.y, aimX - c.x);
    const len = Math.max(W, H);
    const ex = c.x + Math.cos(ang) * len, ey = c.y + Math.sin(ang) * len;
    for (const e of G.enemies) {
      if (pointSegDist(e.x, e.y, c.x, c.y, ex, ey) < e.r + 14) e.hp -= 20 * G.stats.power;
    }
    G.fx.push({ kind: 'beam', x1: c.x, y1: c.y, x2: ex, y2: ey, born: G.t, life: .25 });
  } else if (id === 'bomb') {
    for (const e of G.enemies) e.hp -= 15 * G.stats.power;
    G.fx.push({ kind: 'flash', born: G.t, life: .35 });
  } else if (id === 'repulse') {
    for (const e of G.enemies) {
      const dx = e.x - c.x, dy = e.y - c.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      e.x += (dx / d) * 220; e.y += (dy / d) * 220;
    }
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: Math.max(W, H) * 0.6, born: G.t, life: .45, color: '#fff' });
  } else if (id === 'chain') {
    let first = null, firstD = Infinity;
    for (const e of G.enemies) {
      const dd = dist(e.x, e.y, c.x, c.y);
      if (dd < firstD) { firstD = dd; first = e; }
    }
    if (first) {
      first.hp -= 10 * G.stats.power;
      G.fx.push({ kind: 'arc', x1: c.x, y1: c.y, x2: first.x, y2: first.y, born: G.t, life: .3 });
      const chained = new Set([first]);
      let prev = first;
      for (let i = 0; i < 3; i++) {
        let next = null, nextD = 120;
        for (const e of G.enemies) {
          if (chained.has(e)) continue;
          const dd = dist(e.x, e.y, prev.x, prev.y);
          if (dd < nextD) { nextD = dd; next = e; }
        }
        if (!next) break;
        next.hp -= 6 * G.stats.power;
        G.fx.push({ kind: 'arc', x1: prev.x, y1: prev.y, x2: next.x, y2: next.y, born: G.t, life: .3 });
        chained.add(next);
        prev = next;
      }
    }
  } else if (id === 'nova') {
    G.fx.push({ kind: 'nova', x: aimX, y: aimY, r: 0, max: 120, born: G.t, life: .85, hitAt: G.t + .45, hit: false, damage: 18 * G.stats.power });
  } else if (id === 'missile') {
    let target = null, targetD = Infinity;
    for (const e of G.enemies) {
      const dd = dist(e.x, e.y, c.x, c.y);
      if (dd < targetD) { targetD = dd; target = e; }
    }
    G.missiles.push({ x: c.x, y: c.y, vx: 0, vy: -120, target, tail: [], life: 8 });
  } else if (id === 'blink') {
    G.blinkHome = { x: c.x, y: c.y };
    G.blinkReturn = G.t + 1.5;
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: 60, born: G.t, life: .4, color: '#b39dff' });
    c.x = clamp(aimX, 40, W - 40);
    c.y = clamp(aimY, 40, H - 40);
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: 60, born: G.t, life: .4, color: '#b39dff' });
  }
  // reward skill use with XP
  applyXp(CONFIG.xpPerSkillUse);
  updateSkillBar();
}
function pointSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const l2 = dx * dx + dy * dy || 1;
  let t = ((px - ax) * dx + (py - ay) * dy) / l2;
  t = clamp(t, 0, 1);
  return dist(px, py, ax + t * dx, ay + t * dy);
}

// --- input ---------------------------------------------------------------
cv.addEventListener('pointerdown', (e) => {
  if (!G || !G.running || G.paused) return;
  const r = cv.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (G.aiming) {
    triggerSkill(G.aiming, x, y);
    setAiming(null);
  } else {
    cv.setPointerCapture(e.pointerId);
    fastTimer = setTimeout(() => { fastMode = true; }, 150);
  }
});
cv.addEventListener('pointerup',     cancelFast);
cv.addEventListener('pointercancel', cancelFast);
cv.addEventListener('contextmenu',   e => e.preventDefault());

// --- HUD: skill bar ------------------------------------------------------
const skillsEl = document.getElementById('skills');
function renderSkillBar() {
  skillsEl.innerHTML = '';
  for (const id of G.unlocked) {
    if (id === 'missile') continue; // auto-fires; no button needed
    if (id === 'drone') continue;   // passive orbit; no button needed
    const sk = SKILLS[id];
    const b = document.createElement('button');
    b.className = 'skill';
    b.dataset.id = id;
    b.innerHTML = `<span class="nm">${sk.name}</span><span class="tap">${sk.tap === 2 ? 'AIM·TAP' : 'TAP'}</span><i class="cd"></i>`;
    b.addEventListener('pointerdown', (ev) => {
      ev.stopPropagation();
      if (G.paused) return;
      if (sk.tap === 2) {
        setAiming(G.aiming === id ? null : id);
      } else {
        triggerSkill(id);
      }
    });
    skillsEl.appendChild(b);
  }
  updateSkillBar();
}
function setAiming(id) {
  G.aiming = id;
  [...skillsEl.children].forEach(b => b.classList.toggle('aiming', b.dataset.id === id));
}
function updateSkillBar() {
  [...skillsEl.children].forEach(b => {
    const id = b.dataset.id, sk = SKILLS[id];
    const cd = b.querySelector('.cd');
    const total = sk.cooldown * G.stats.cooldown;
    const remain = Math.max(0, (G.cooldowns[id] || 0) - G.t);
    cd.style.transform = `scaleY(${remain / total})`;
  });
}

// --- level up ------------------------------------------------------------
const overlay = document.getElementById('overlay');
const cardsEl = document.getElementById('cards');
function openLevelUp(picksRemaining) {
  if (picksRemaining === undefined) {
    picksRemaining = Math.random() < CONFIG.doublePickChance ? 2 : 1;
  }
  G.paused = true;
  setAiming(null);
  sfx.levelUp();
  const offers = rollOffers(G.unlocked, Math.random);
  cardsEl.innerHTML = '';
  overlay.querySelector('h2').textContent = picksRemaining === 2 ? 'DOUBLE PICK!' : 'LEVEL UP';
  for (const o of offers) {
    const el = document.createElement('button');
    el.className = 'pick ' + o.kind;
    const badge = o.kind === 'skill' ? (o.tap === 2 ? 'SKILL·AIM' : 'SKILL') : 'STAT';
    el.innerHTML = `<div class="h"><span class="name">${o.name}</span><span class="badge">${badge}</span></div><div class="d">${o.desc}</div>`;
    el.addEventListener('click', () => choose(o, picksRemaining));
    cardsEl.appendChild(el);
  }
  overlay.classList.add('show');
}
function choose(o, picksRemaining) {
  if (o.kind === 'stat') {
    G.stats = applyStatCard(G.stats, o.id);
  } else {
    if (!G.unlocked.includes(o.id)) G.unlocked.push(o.id);
    renderSkillBar();
  }
  const remaining = picksRemaining - 1;
  if (remaining > 0) {
    openLevelUp(remaining);
    return;
  }
  overlay.classList.remove('show');
  G.paused = false;
  // queue may hold more level-ups
  if (G.pendingLevels > 0) { G.pendingLevels--; openLevelUp(); }
}

// --- main loop -----------------------------------------------------------
let prev = 0;
function frame(now) {
  requestAnimationFrame(frame);
  if (!G || !G.running) return;
  const dt = Math.min(0.05, (now - prev) / 1000 || 0) * (fastMode ? 2 : 1);
  prev = now;
  if (!G.paused && !G.pageHidden) step(dt);
  draw();
  if (fastMode) {
    ctx.save();
    ctx.font = 'bold 16px system-ui';
    ctx.fillStyle = 'rgba(255,220,50,0.9)';
    ctx.fillText('2×', 10, 28);
    ctx.restore();
  }
}
function step(dt) {
  G.t += dt;
  const nextWave = waveForTime(G.t);
  if (nextWave !== G.wave) {
    G.wave = nextWave;
    announceWave(G.wave);
  }
  const d = derive(G.stats, G.wave);
  const c = G.core;

  // regen
  if (G.stats.regen) c.hp = clamp(c.hp + G.stats.regen * dt, 0, CONFIG.coreHp);

  // blink snap-back
  if (G.blinkHome && G.t >= G.blinkReturn) {
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: 60, born: G.t, life: .4, color: '#b39dff' });
    c.x = G.blinkHome.x; c.y = G.blinkHome.y;
    G.blinkHome = null; G.blinkReturn = 0;
    G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: 0, max: 60, born: G.t, life: .4, color: '#b39dff' });
  }

  // boss spawn — one per 5th wave
  if (isBossWave(G.wave) && G.wave > G.lastBossWave) {
    spawnBoss();
    G.lastBossWave = G.wave;
  }

  // spawn
  if (G.t >= CONFIG.warmupSec && G.t - G.lastSpawn > d.spawnInterval) { spawnEnemy(); G.lastSpawn = G.t; }

  for (const f of G.fx) {
    if (f.kind === 'nova' && !f.hit && G.t >= f.hitAt) {
      f.hit = true;
      for (const e of G.enemies) {
        if (dist(e.x, e.y, f.x, f.y) <= f.max + e.r) e.hp -= f.damage;
      }
      G.fx.push({ kind: 'ring', x: f.x, y: f.y, r: 24, max: f.max, born: G.t, life: .25, color: '#ffec99' });
    }
  }

  // auto-fire: target nearest enemy in range
  const slow = G.t < G.slowUntil ? 0.4 : 1;
  if (G.t - G.lastAuto > 1 / d.autoRate) {
    let best = null, bestD = d.autoRange;
    for (const e of G.enemies) {
      const dd = dist(e.x, e.y, c.x, c.y);
      if (dd < bestD) { bestD = dd; best = e; }
    }
    if (best) {
      const ang = Math.atan2(best.y - c.y, best.x - c.x);
      const isCrit = Math.random() < d.critChance;
      G.shots.push({ x: c.x, y: c.y, vx: Math.cos(ang) * 420, vy: Math.sin(ang) * 420, dmg: isCrit ? d.autoDamage * 2 : d.autoDamage, crit: isCrit, life: 1.2 });
      G.lastAuto = G.t;
    }
  }

  // move shots
  for (const s of G.shots) { s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt; }
  // shot vs enemy
  for (const s of G.shots) {
    for (const e of G.enemies) {
      if (e.hp > 0 && dist(s.x, s.y, e.x, e.y) < e.r + 3) {
        e.hp -= s.dmg; s.life = 0;
        G.fx.push({ kind: 'spark', x: s.x, y: s.y, born: G.t, life: .2 });
        break;
      }
    }
  }
  G.shots = G.shots.filter(s => s.life > 0 && s.x > -20 && s.x < W + 20 && s.y > -20 && s.y < H + 20);

  // missile auto-fire
  if (G.unlocked.includes('missile') && skillReady('missile') && G.enemies.length > 0) {
    let target = null, targetD = Infinity;
    for (const e of G.enemies) { const dd = dist(e.x, e.y, c.x, c.y); if (dd < targetD) { targetD = dd; target = e; } }
    G.missiles.push({ x: c.x, y: c.y, vx: 0, vy: -120, target, tail: [], life: 8 });
    G.cooldowns['missile'] = G.t + SKILLS.missile.cooldown * G.stats.cooldown;
  }

  // missiles — homing
  for (const m of G.missiles) {
    m.life -= dt;
    if (!m.target || m.target.hp <= 0) {
      let best = null, bestD = Infinity;
      for (const e of G.enemies) { if (e.hp > 0) { const dd = dist(m.x, m.y, e.x, e.y); if (dd < bestD) { bestD = dd; best = e; } } }
      m.target = best;
    }
    if (m.target) {
      const ang = Math.atan2(m.target.y - m.y, m.target.x - m.x);
      const curr = Math.atan2(m.vy, m.vx);
      let diff = ang - curr;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const newAng = curr + Math.sign(diff) * Math.min(Math.abs(diff), 3.5 * dt);
      const spd = 140;
      m.vx = Math.cos(newAng) * spd; m.vy = Math.sin(newAng) * spd;
    }
    m.tail.push({ x: m.x, y: m.y });
    if (m.tail.length > 4) m.tail.shift();
    m.x += m.vx * dt; m.y += m.vy * dt;
    if (m.target && m.target.hp > 0 && dist(m.x, m.y, m.target.x, m.target.y) < m.target.r + 10) {
      m.target.hp -= 25 * G.stats.power;
      G.fx.push({ kind: 'ring', x: m.x, y: m.y, r: 0, max: 40, born: G.t, life: .3, color: '#ff4dff' });
      m.life = 0;
    }
  }
  G.missiles = G.missiles.filter(m => m.life > 0);

  // move enemies toward core
  let totalXp = 0;
  const survivors = [];
  const spawnedFromSplitters = [];
  for (const e of G.enemies) {
    if (e.hp <= 0) {
      totalXp += xpForKill(G.stats, e);
      const col = e.boss ? '#ffd700' : e.tanky ? '#ff8a4d' : e.splitter ? '#f277ff' : getCss('--enemy');
      G.fx.push({ kind: 'burst', x: e.x, y: e.y, color: col, born: G.t, life: 0.4, n: 7 });
      spawnedFromSplitters.push(...splitterChildren(e));
      continue;
    }
    const ang = Math.atan2(c.y - e.y, c.x - e.x);
    e.x += Math.cos(ang) * e.spd * slow * dt;
    e.y += Math.sin(ang) * e.spd * slow * dt;
    if (enemyHitsCore(e, c)) {
      if (G.t >= G.shieldUntil) { c.hp -= coreDamageTaken(G.stats, e.tanky ? 14 : 7); G.shakeUntil = G.t + 0.25; sfx.hit(); }
      e.hp = 0; e.consumed = true;
      G.fx.push({ kind: 'ring', x: c.x, y: c.y, r: CONFIG.coreRadius, max: CONFIG.coreRadius + 18, born: G.t, life: .3, color: '#ff5d73' });
      continue;
    }
    survivors.push(e);
  }
  const removed = G.enemies.length - survivors.length;
  G.enemies = survivors;
  G.enemies.push(...spawnedFromSplitters);
  if (removed > 0) {
    G.kills += removed;
    applyXp(totalXp);
    sfx.kill();
  }

  // drone auto-zap
  if (G.unlocked.includes('drone')) {
    G.drone.angle += 1.4 * dt;
    const dr = CONFIG.coreRadius + 20;
    const dx = c.x + Math.cos(G.drone.angle) * dr;
    const dy = c.y + Math.sin(G.drone.angle) * dr;
    const zapInterval = SKILLS.drone.cooldown * G.stats.cooldown;
    if (G.t - G.drone.lastZap >= zapInterval) {
      let best = null, bestD = Infinity;
      for (const e of G.enemies) {
        if (e.hp <= 0) continue;
        const d = dist(dx, dy, e.x, e.y);
        if (d < 140 && d < bestD) { bestD = d; best = e; }
      }
      if (best) {
        best.hp -= CONFIG.droneDamageMult * G.stats.power;
        G.fx.push({ kind: 'arc', x1: dx, y1: dy, x2: best.x, y2: best.y, born: G.t, life: .25 });
        G.drone.lastZap = G.t;
      }
    }
  }

  // boss arrival announcement
  if (!G.bossFlashUntil && G.enemies.some(e => e.boss)) {
    G.bossFlashUntil = G.t + 2;
  }

  // fx ttl
  G.fx = G.fx.filter(f => G.t - f.born < f.life);

  // hud
  hudEl.classList.toggle('lowcore', c.hp / CONFIG.coreHp < 0.3);
  document.getElementById('wave').textContent = G.wave;
  document.getElementById('lv').textContent = G.level;
  document.getElementById('hp').textContent = Math.ceil(c.hp);
  document.getElementById('slow-badge').style.opacity = G.t < G.slowUntil ? '1' : '0';
  document.getElementById('xpfill').style.width = (100 * G.xp / G.xpNeeded) + '%';
  updateSkillBar();

  if (c.hp <= 0) gameOver();
}

function gameOver() {
  G.running = false;
  sfx.over();
  overlay.classList.remove('show');
  if (G.wave > bestWave) { bestWave = G.wave; localStorage.setItem('bestWave', bestWave); }
  document.getElementById('deadmsg').textContent = `CORE BREACHED · WAVE ${G.wave} · LV ${G.level}`;
  document.getElementById('killcount').textContent = G.kills > 0 ? `KILLS  ${G.kills}` : '';
  document.getElementById('bestscore').textContent = bestWave > 0 ? `BEST  WAVE ${bestWave}` : '';
  document.getElementById('start').textContent = 'RETRY';
  document.getElementById('splash').classList.remove('hidden');
}

// --- draw ----------------------------------------------------------------
function draw() {
  drawFrame(G, ctx, W, H, DPR, getCss);
}

const cssCache = {};
function getCss(v) {
  if (!cssCache[v]) cssCache[v] = getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  return cssCache[v];
}

document.getElementById('start').addEventListener('click', () => { sfx.unlock(); newGame(); });
document.addEventListener('visibilitychange', () => {
  if (!G) return;
  G.pageHidden = document.hidden;
  if (!document.hidden) prev = performance.now();
});
requestAnimationFrame(frame);

// expose for headless/e2e probing (loop verification can read window.__CORE)
window.__CORE = () => G;
</script>
</body>
</html>
